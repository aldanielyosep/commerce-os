plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails
  - rubocop-factory_bot

AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  SuggestExtensions: false

  Exclude:
    - "bin/*"

    - "vendor/**/*"
    - "**/vendor/**/*"

    - "tmp/**/*"
    - "**/tmp/**/*"

    - "node_modules/**/*"
    - "**/node_modules/**/*"

    - "db/schema.rb"
    - "db/*_schema.rb"
    - "db/migrate/**/*"

    - "spec/schema.rb"

    - "actionpack/lib/action_dispatch/journey/parser.rb"
    - "actionmailbox/test/dummy/**/*"
    - "actiontext/test/dummy/**/*"

Layout/LineLength:
  Max: 120
  Exclude:
    - "config/initializers/devise.rb"

Layout/SpaceInsidePercentLiteralDelimiters:
  Enabled: false

Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false

Bundler/OrderedGems:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/GlobalStdStream:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "config/initializers/devise.rb"
    - "config/routes.rb"
    - "spec/**/*.rb"

Metrics/MethodLength:
  Max: 20

Metrics/ClassLength:
  Max: 200

Metrics/ModuleLength:
  Max: 200

Metrics/AbcSize:
  Max: 30

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 20

RSpec/NestedGroups:
  Max: 4

RSpec/EmptyExampleGroup:
  Exclude:
    - "spec/requests/**/*"

Rails/Output:
  Exclude:
    - "db/seeds.rb"

Rails/I18nLocaleTexts:
  Enabled: false

Rails/SkipsModelValidations:
  Exclude:
    - "db/migrate/**/*"

FactoryBot/CreateList:
  Enabled: true

RSpecRails/InferredSpecType: 
  Exclude: 
  - "spec/requests/**/*"
