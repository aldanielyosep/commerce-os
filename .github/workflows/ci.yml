name: CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [ main ]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci.yml"

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: apps/api/Gemfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        working-directory: apps/api
        run: bin/brakeman --no-pager
      
      - name: Scan for known security vulnerabilities in gems used
        working-directory: apps/api
        run: bin/bundler-audit
      
  lint:
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: apps/api/Gemfile
      RUBOCOP_CACHE_ROOT: apps/api/tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('apps/api/.ruby-version', 'apps/api/**/.rubocop.yml', 'apps/api/**/.rubocop_todo.yml', 'apps/api/Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        working-directory: apps/api
        run: bin/rubocop -f github

  test_coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      BUNDLE_GEMFILE: apps/api/Gemfile
      RAILS_ENV: test
      DB_PGSQL_USERNAME: postgres
      DB_PGSQL_PASSWORD: postgres
      DB_PGSQL_HOST: 127.0.0.1
      DB_PGSQL_PORT: 5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        working-directory: apps/api
        run: bundle exec rails db:prepare

      - name: Run tests with coverage
        working-directory: apps/api
        run: COVERAGE=true bundle exec rspec

      - name: Checkout code Simplecov
        uses: joshmfrankel/simplecov-check-action@main
        with:
          minimum_suite_coverage: 90
          minimum_file_coverage: 90
          coverage_path: apps/api/coverage/.last_run.json
          github_token: ${{ secrets.GH_PAT }}
          debug_mode: true

      - name: bot push comment coverage report
        if: ${{ github.event_name == 'pull_request' }}
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          working-directory: apps/api
          lcov-file: coverage/lcov.info
          github-token: ${{ secrets.GH_PAT }}
          filter-changed-files: true

