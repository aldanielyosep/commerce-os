name: Deploy Staging API

on:
  push:
    branches: [ main ]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

concurrency:
  group: deploy-staging-api
  cancel-in-progress: true

jobs:
  deploy_staging_api:
    name: Deploy API to Railway Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RAILWAY_TOKEN: ${{ secrets['RAILWAY_TOKEN'] }}
      RAILWAY_PROJECT_ID: ${{ secrets['RAILWAY_PROJECT_ID'] }}
      RAILWAY_ENVIRONMENT: ${{ secrets['RAILWAY_ENV_STAGING'] }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy api service to Railway staging
        run: railway up --service api --detach
