name: Deploy Staging Admin Web

on:
  push:
    branches: [ main ]
    paths:
      - "apps/admin-web/**"
      - ".github/workflows/deploy-staging-admin-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-staging-admin-web
  cancel-in-progress: true

jobs:
  deploy_staging_admin_web:
    name: Deploy admin-web to Railway Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      RAILWAY_TOKEN: ${{ secrets['RAILWAY_TOKEN'] }}
      RAILWAY_PROJECT_ID: ${{ secrets['RAILWAY_PROJECT_ID'] }}
      RAILWAY_ENVIRONMENT: ${{ secrets['RAILWAY_ENV_STAGING'] }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy admin-web service to Railway staging
        run: railway up ./apps/admin-web --path-as-root --service admin-web --detach
